      <text x="275" y="100" text-anchor="middle">Potager</text>
      <text x="572" y="92" text-anchor="middle" fill="#e8e4d4">Bosquet</text>
      <text x="660" y="190" text-anchor="middle" font-size="15" fill="#5d5244">muret</text>
