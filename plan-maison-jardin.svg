  <!-- ======== rose des vents & échelle ======== -->
  <g transform="translate(1380,210)" stroke="#4a3f30" fill="#4a3f30">
    <circle r="30" fill="none" stroke-width="1.4"/>
    <path d="M0 -26 L6 8 L0 2 L-6 8 Z"/>
    <text y="-38" text-anchor="middle" font-size="18" stroke="none">N*</text>
  </g>
  <g transform="translate(112,972)">
    <rect x="0" y="0" width="110" height="7" fill="#4a3f30"/>
