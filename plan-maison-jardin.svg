      <use href="#hedgeBlob" x="15" y="166"/><use href="#hedgeBlob" x="12" y="204"/><use href="#hedgeBlob" x="16" y="242"/>
      <use href="#hedgeBlob" x="12" y="280"/><use href="#hedgeBlob" x="15" y="318"/><use href="#hedgeBlob" x="12" y="356"/>
      <use href="#hedgeBlob" x="15" y="394"/><use href="#hedgeBlob" x="12" y="432"/><use href="#hedgeBlob" x="16" y="470"/>
      <use href="#hedgeBlob" x="12" y="508"/><use href="#hedgeBlob" x="14" y="546"/><use href="#hedgeBlob" x="12" y="584"/>
      <use href="#hedgeBlob" x="15" y="622"/><use href="#hedgeBlob" x="12" y="660"/><use href="#hedgeBlob" x="14" y="698"/>
      <use href="#hedgeBlob" x="12" y="736"/><use href="#hedgeBlob" x="14" y="772"/>
