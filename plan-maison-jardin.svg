      <rect x="30.8" y="508.2" width="665.5" height="170.5" fill="url(#roof1)" stroke="#4a3a30" stroke-width="3"/>
      <line x1="30.8" y1="593.5" x2="696.3" y2="593.5" stroke="#3c2e26" stroke-width="2.5"/>
