    <g filter="url(#soft)">
      <rect x="99" y="302.5" width="231" height="143" fill="url(#roof1)" stroke="#4a3a30" stroke-width="3"/>
      <line x1="99" y1="374" x2="330" y2="374" stroke="#3c2e26" stroke-width="2.5"/>
