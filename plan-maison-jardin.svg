      <g transform="translate(499.1,317.2) rotate(-35)"><rect width="16" height="13" fill="#d8e4ea" stroke="#9bb0ba"/></g>
      <g transform="translate(528,297) rotate(-35)"><rect width="16" height="11" fill="#e7d8de" stroke="#bfa3ae"/></g>
      <g transform="translate(556.9,276.8) rotate(-35)"><rect width="14" height="14" fill="#dfe7d0" stroke="#aab894"/></g>
    </g>

