    <g fill="#9a7d80">
      <circle cx="363" cy="508" r="13"/><circle cx="407" cy="508" r="13"/>
      <circle cx="616" cy="508" r="13"/><circle cx="660" cy="508" r="13"/>
    </g>

    <!-- ===== appentis vélos (1.375..5.125, 14..20) ===== -->
    <g filter="url(#soft)">
      <rect x="30.25" y="308" width="82.5" height="132" fill="#8d8170" stroke="#5d5244" stroke-width="2.5"/>
      <path d="M30.25 341 H112.75 M30.25 374 H112.75 M30.25 407 H112.75" stroke="#5d5244" stroke-width="1.2" opacity="0.6"/>
