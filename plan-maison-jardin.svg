    <g transform="translate(462,346.5)"><use href="#treeWinter"/></g>
    <g transform="translate(352,214.5) scale(0.7)"><use href="#treeWinter"/></g>
    <g transform="translate(940.5,621.5)"><use href="#treeWinter"/></g>
    <g transform="translate(1111,352) scale(0.85)"><use href="#treeWinter"/></g>
    <g transform="translate(1122,484) scale(1.05)"><use href="#treeWinter"/></g>

