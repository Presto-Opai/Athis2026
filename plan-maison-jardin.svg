      <rect x="529" y="583" width="20" height="20" fill="#8d8170" stroke="#4a3a30" stroke-width="2"/>
      <!-- lucarne + velux -->
      <rect x="160" y="520" width="34" height="26" fill="#8d6e5c" stroke="#4a3a30" stroke-width="2"/>
      <rect x="420" y="518" width="30" height="20" fill="#aebfc7" stroke="#4a3a30" stroke-width="2"/>
